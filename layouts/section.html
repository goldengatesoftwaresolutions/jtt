{{ define "main" }}
<section class="content-grid blog-list">
  <main>
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="blog-description">{{ . }}</div>{{ end }}
    <ul>
      {{ range .RegularPages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
      {{ end }}
    </ul>
  </main>
</section>
{{ end }}
